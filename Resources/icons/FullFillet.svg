<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c8cd4"/>
      <stop offset="100%" stop-color="#2a5ca8"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e04040"/>
      <stop offset="100%" stop-color="#a02020"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a6aa8"/>
      <stop offset="100%" stop-color="#204080"/>
    </linearGradient>
  </defs>
  <!-- Main block front face -->
  <polygon points="6,42 6,10 38,6 38,38" fill="url(#blue)" stroke="#1a3a70" stroke-width="1.8"/>
  <!-- Rounded corner fill (fillet) -->
  <path d="M 6,42 L 38,38 L 38,30 Q 30,22 22,22 Q 10,22 6,30 Z" fill="url(#red)" stroke="#801010" stroke-width="1.8"/>
  <!-- Top face -->
  <polygon points="6,10 38,6 58,16 26,20" fill="#8ab4f8" stroke="#1a3a70" stroke-width="1.8"/>
  <!-- Side face -->
  <polygon points="38,6 58,16 58,48 38,38" fill="url(#side)" stroke="#1a3a70" stroke-width="1.8"/>
  <!-- Rounded edge arc -->
  <path d="M 38,30 Q 30,22 22,22" fill="none" stroke="#a02020" stroke-width="3" stroke-linecap="round"/>
  <!-- Fillet indicator -->
  <path d="M 16,30 Q 22,24 30,26" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
</svg>
